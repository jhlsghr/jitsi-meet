name: Build Jitsi Meet Android + iOS (Jarsigner Fix)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (国内镜像+重试)
        run: |
          npm config set registry https://registry.npmmirror.com
          npm ci || sleep 10 && npm ci || sleep 20 && npm ci

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      # 改用 JDK 自带的 jarsigner，不用管 Android SDK 路径
      - name: Sign APK with jarsigner
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > my-release-key.jks
          jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 \
            -keystore my-release-key.jks \
            -storepass ${{ secrets.RELEASE_KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.RELEASE_KEY_PASSWORD }} \
            android/app/build/outputs/apk/release/app-release-unsigned.apk \
            ${{ secrets.RELEASE_KEY_ALIAS }}

      - name: Verify Signed APK
        run: |
          jarsigner -verify android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Rename to signed APK
        run: |
          mv android/app/build/outputs/apk/release/app-release-unsigned.apk \
             android/app/build/outputs/apk/release/app-release-signed.apk

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: jitsi-meet-android-signed
          path: android/app/build/outputs/apk/release/app-release-signed.apk

  build-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm config set registry https://registry.npmmirror.com
          npm ci || sleep 10 && npm ci || sleep 20 && npm ci

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build iOS App
        run: |
          cd ios
          xcodebuild build -workspace jitsi-meet.xcworkspace \
            -scheme JitsiMeet \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS App
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: ios/build/Release-iphoneos/*.app
