name: Build Jitsi Meet Android & iOS

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: jitsi-meet-android-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

build-ios:
  runs-on: macos-15  # 换成 macOS 15，自带 Xcode 16
  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install CocoaPods
      run: |
        cd ios
        pod deintegrate || true
        pod install --clean-install

    - name: Build iOS App
      run: |
        cd ios
        xcodebuild \
          -workspace jitsi-meet.xcworkspace \
          -scheme JitsiMeet \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -derivedDataPath ../build \
          build CODE_SIGNING_ALLOWED=NO

    - name: Upload iOS App
      uses: actions/upload-artifact@v4
      with:
        name: jitsi-meet-ios-app
        path: build/Build/Products/Release-iphoneos/*.app
        if-no-files-found: error
