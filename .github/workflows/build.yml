name: Build Jitsi Meet Android + iOS (Final Fixed)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (国内镜像+重试)
        run: |
          npm config set registry https://registry.npmmirror.com
          npm ci || sleep 10 && npm ci || sleep 20 && npm ci

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          build-tools: 33.0.2
          ndk: 25.2.9519653

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK with apksigner (full path)
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > my-release-key.jks
          # 使用完整路径调用 apksigner
          $ANDROID_HOME/build-tools/33.0.2/apksigner sign \
            --ks my-release-key.jks \
            --ks-key-alias ${{ secrets.RELEASE_KEY_ALIAS }} \
            --ks-pass pass:${{ secrets.RELEASE_KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.RELEASE_KEY_PASSWORD }} \
            --out android/app/build/outputs/apk/release/app-release-signed.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: jitsi-meet-android-signed
          path: android/app/build/outputs/apk/release/app-release-signed.apk

  build-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm config set registry https://registry.npmmirror.com
          npm ci || sleep 10 && npm ci || sleep 20 && npm ci

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build iOS App
        run: |
          cd ios
          xcodebuild build -workspace jitsi-meet.xcworkspace \
            -scheme JitsiMeet \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS App
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: ios/build/Release-iphoneos/*.app
